# SFTP source endpoint
app.sftp.host=localhost
app.sftp.port=22
app.sftp.username=sftp-user
app.sftp.directory=incoming
app.sftp.uri=sftp://{{app.sftp.host}}:{{app.sftp.port}}/{{app.sftp.directory}}?username={{app.sftp.username}}

# Destination MinIO endpoint and metadata
# Override placeholder credentials with secure runtime configuration before production use.
app.minio.bucket-name=my-bucket
app.minio.endpoint=http://localhost:9000
app.minio.access-key=change-me
app.minio.secret-key=change-me
app.minio.uri=aws2-s3://{{app.minio.bucket-name}}?accessKey={{app.minio.access-key}}&secretKey=RAW({{app.minio.secret-key}})&overrideEndpoint=true&uriEndpointOverride={{app.minio.endpoint}}&autoCreateBucket=true

# RabbitMQ AMQP endpoint
app.amqp.uri=amqp:queue:minio-resource-events

# Keep the application alive while Camel routes are running
camel.springboot.main-run-controller=true
