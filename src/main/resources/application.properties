# SFTP source endpoint
app.sftp.host=localhost
app.sftp.port=22
app.sftp.username=sftp-user
app.sftp.directory=incoming
app.sftp.uri=sftp://{{app.sftp.host}}:{{app.sftp.port}}/{{app.sftp.directory}}?username={{app.sftp.username}}

# Destination S3 endpoint and metadata
# Override placeholder credentials with secure runtime configuration before production use.
app.s3.bucket-name=my-bucket
app.s3.region=us-east-1
app.s3.access-key=change-me
app.s3.secret-key=change-me
app.s3.uri=aws2-s3://{{app.s3.bucket-name}}?region={{app.s3.region}}&accessKey={{app.s3.access-key}}&secretKey=RAW({{app.s3.secret-key}})&autoCreateBucket=true

# RabbitMQ AMQP endpoint
app.amqp.uri=amqp:queue:s3-resource-events
